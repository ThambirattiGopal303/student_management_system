<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student | Student Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#4e73df,#1cc88a);
        }

        .container{
            background:#fff;
            padding:40px;
            width:400px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#444;
        }

        input{
            width:100%;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;
            outline:none;
            font-size:14px;
            transition:0.3s;
        }

        input:focus{
            border-color:#4e73df;
            box-shadow:0 0 5px rgba(78,115,223,0.3);
        }

        button{
            width:100%;
            padding:12px;
            background:#4e73df;
            border:none;
            color:#fff;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2e59d9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Add Student</h2>
        <form method="post" action="{% url 'add_student' %}">
            {% csrf_token %}
           
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" placeholder="Enter student name" required name="name">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <input type="text" placeholder="Enter gender (Male/Female)" required name="gender" >
            </div>
            <div class="form-group">
                <label>Course</label>
                <input type="text" placeholder="Enter course name" required name="course">
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" placeholder="Enter city" required name="city">
            </div>
            <button type="submit">Add Student</button>
        </form>
    </div>

</body>
</html>
